name: Permit Velocity & Ingestion

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8am UTC (12am PT)
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install requests
          
      - name: Run Permit Tracker
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LACITY_APP_TOKEN: ${{ secrets.LACITY_APP_TOKEN }}
        run: python scripts/permit-velocity.py
