name: Feed Staleness Watchdog

on:
  schedule:
    - cron: '0 15 * * *' # Daily at 15:00 UTC (7am PT)
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Prints a short SHA of the DB URL so we can verify which Supabase
      # project the GitHub secrets point at (the value itself is masked by
      # GitHub). Expected for the claimed project (elhtexcstngvgoyidtlc): 0f666b16af83
      - name: DB fingerprint
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: printf '%s' "$NEXT_PUBLIC_SUPABASE_URL" | sha256sum | cut -c1-12

      - name: Check feed freshness
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/feed-watchdog.js
