name: Security Awareness Brief

on:
  schedule:
    - cron: '0 7 * * 1' # Runs at 07:00 UTC on Monday (11pm Sunday PT)
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Generate Security Brief
        run: python scripts/security-brief.py
        env:
          # Optional: Use a reference date to backfill/test if needed
          # REFERENCE_DATE: '2025-01-19'
          LACITY_APP_TOKEN: ${{ secrets.LACITY_APP_TOKEN }}
          
      - name: Commit and Push Brief
        run: |
          git config --global user.name 'Security Sentinel'
          git config --global user.email 'sentinel@users.noreply.github.com'
          git add data/security_brief.json
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Update weekly security brief"
          git push
