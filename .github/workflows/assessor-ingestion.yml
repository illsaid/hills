name: LA County Parcel Details Ingestion

on:
  schedule:
    - cron: '0 10 * * 1' # Weekly on Monday at 10am UTC (2am PT)
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - run: npm install
      
      - name: Run Parcel Fetcher
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/fetch-assessor-data.js
