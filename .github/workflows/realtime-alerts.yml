name: Realtime Alerts (Hourly)

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      # Each scraper runs as its own step. `!cancelled()` means a failure in
      # one does NOT stop the others, and the failed step is named in the
      # run summary / notification email.
      - name: LAFD Alerts
        if: ${{ !cancelled() }}
        run: node scripts/lafd-alerts.js

      - name: Social Sentinel (SociaVault / Google Search)
        if: ${{ !cancelled() }}
        env:
          SOCIAVAULT_API_KEY: ${{ secrets.SOCIAVAULT_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
        run: node scripts/social-sentinel.js

      - name: News Sentinel (NewsData.io)
        if: ${{ !cancelled() }}
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: node scripts/news-sentinel.js

      - name: Google News RSS (keyless)
        if: ${{ !cancelled() }}
        run: node scripts/google-news-feed.js
